<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- SWISS text - dark green -->
  <text x="8" y="32" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="34" fill="#284d47" letter-spacing="-1">SWISS</text>
  <!-- COFFE text - medium green, with space for bean icon replacing the O -->
  <!-- C -->
  <text x="8" y="68" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="34" fill="#589e94" letter-spacing="-1">C</text>
  <!-- Coffee bean icon replacing the second O in COFFE -->
  <g transform="translate(37, 42)">
    <!-- Bean outer shape -->
    <ellipse cx="11" cy="13" rx="11" ry="14" fill="#284d47"/>
    <ellipse cx="11" cy="13" rx="9" ry="12" fill="#356b63"/>
    <!-- Bean crease line -->
    <path d="M4 5 Q11 13 4 21" stroke="#284d47" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M18 5 Q11 13 18 21" stroke="#284d47" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Leaf overlay -->
    <path d="M5 4 Q14 2 20 8 Q16 16 8 18 Q2 12 5 4Z" fill="#589e94" opacity="0.85"/>
    <path d="M5 4 Q12 10 8 18" stroke="#284d47" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>
  <!-- FFE after the bean -->
  <text x="62" y="68" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="34" fill="#589e94" letter-spacing="-1">FFE</text>
</svg>
