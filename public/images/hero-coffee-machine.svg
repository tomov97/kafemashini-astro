<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <!-- Background circle -->
  <circle cx="200" cy="250" r="180" fill="#284d47" opacity="0.08"/>

  <!-- Coffee machine body -->
  <rect x="130" y="80" width="140" height="300" rx="16" fill="#284d47"/>
  <rect x="134" y="84" width="132" height="292" rx="14" fill="#356b63"/>

  <!-- Screen/display -->
  <rect x="155" y="110" width="90" height="50" rx="8" fill="#1a332f"/>
  <rect x="160" y="115" width="80" height="40" rx="6" fill="#284d47"/>
  <!-- Display dots -->
  <circle cx="185" cy="130" r="3" fill="#589e94"/>
  <circle cx="200" cy="130" r="3" fill="#589e94"/>
  <circle cx="215" cy="130" r="3" fill="#589e94"/>
  <text x="200" y="148" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#589e94">READY</text>

  <!-- Buttons -->
  <circle cx="175" cy="185" r="10" fill="#1a332f"/>
  <circle cx="200" cy="185" r="10" fill="#1a332f"/>
  <circle cx="225" cy="185" r="10" fill="#1a332f"/>
  <circle cx="175" cy="185" r="7" fill="#284d47"/>
  <circle cx="200" cy="185" r="7" fill="#589e94"/>
  <circle cx="225" cy="185" r="7" fill="#284d47"/>

  <!-- Drip tray area -->
  <rect x="150" y="280" width="100" height="8" rx="4" fill="#1a332f"/>

  <!-- Coffee spout -->
  <rect x="185" y="210" width="30" height="70" rx="4" fill="#1a332f"/>
  <rect x="190" y="270" width="8" height="12" rx="2" fill="#284d47"/>
  <rect x="202" y="270" width="8" height="12" rx="2" fill="#284d47"/>

  <!-- Coffee cup -->
  <rect x="172" y="310" width="56" height="45" rx="6" fill="white" stroke="#E5E5E5" stroke-width="2"/>
  <rect x="176" y="314" width="48" height="20" rx="4" fill="#8B6F47"/>
  <!-- Cup handle -->
  <path d="M228 320 C240 320 244 340 228 345" stroke="#E5E5E5" stroke-width="3" fill="none"/>
  <!-- Saucer -->
  <ellipse cx="200" cy="358" rx="40" ry="6" fill="white" stroke="#E5E5E5" stroke-width="1.5"/>

  <!-- Steam lines -->
  <path d="M188 300 Q185 290 188 280" stroke="#589e94" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M200 298 Q197 285 200 275" stroke="#589e94" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M212 300 Q215 290 212 280" stroke="#589e94" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round"/>

  <!-- Water tank (side) -->
  <rect x="270" y="100" width="30" height="200" rx="8" fill="#284d47" opacity="0.3"/>
  <rect x="274" y="140" width="22" height="156" rx="6" fill="#589e94" opacity="0.2"/>

  <!-- Bean container (top) -->
  <path d="M160 80 Q200 50 240 80" fill="#1a332f"/>
  <ellipse cx="200" cy="80" rx="40" ry="8" fill="#284d47"/>

  <!-- Coffee beans inside -->
  <ellipse cx="190" cy="68" rx="6" ry="4" fill="#3d2b1f" transform="rotate(-20 190 68)"/>
  <ellipse cx="205" cy="65" rx="6" ry="4" fill="#4a3728" transform="rotate(15 205 65)"/>
  <ellipse cx="198" cy="72" rx="5" ry="3.5" fill="#3d2b1f" transform="rotate(-5 198 72)"/>

  <!-- Brand text on machine -->
  <text x="200" y="240" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="12" fill="white" opacity="0.4" letter-spacing="3">SWISS</text>

  <!-- Decorative coffee beans floating -->
  <ellipse cx="90" cy="150" rx="12" ry="8" fill="#284d47" opacity="0.15" transform="rotate(-30 90 150)"/>
  <ellipse cx="310" cy="200" rx="10" ry="7" fill="#284d47" opacity="0.12" transform="rotate(20 310 200)"/>
  <ellipse cx="80" cy="350" rx="8" ry="5" fill="#284d47" opacity="0.1" transform="rotate(-15 80 350)"/>
  <ellipse cx="330" cy="380" rx="11" ry="7" fill="#284d47" opacity="0.08" transform="rotate(40 330 380)"/>
</svg>
